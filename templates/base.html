<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Vanv AI Agency{% endblock %}</title>
  <meta name="description" content="{% block description %}Vanv AI Agency LLC provides AI receptionist, calendar booking, SMS confirmations, appointment reminders, rescheduling, cancellation, and follow-up workflows for service businesses.{% endblock %}">
  <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <img src="{{ url_for('static', filename='vanv-logo.svg') }}" alt="Vanv AI Agency logo">
        <div class="brand-copy">
          <span class="brand-title">Vanv AI Agency</span>
          <span class="brand-sub">Vanv AI Agency LLC</span>
        </div>
      </a>

      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/pricing">Pricing</a>
        <a href="/compliance">SMS Consent</a>
        <a href="/terms">Terms</a>
        <a href="/privacy">Privacy</a>
        <a class="nav-cta" href="{{ book_demo_url }}" target="_blank" rel="noreferrer">Book a Demo</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="container footer-inner">
      <div class="brand">
        <img src="{{ url_for('static', filename='vanv-logo.svg') }}" alt="Vanv AI Agency logo">
        <div class="brand-copy">
          <span class="brand-title" style="font-size:1rem">Vanv AI Agency</span>
          <span class="footer-copy">AI receptionist, calendar booking, SMS confirmations, reminders, rescheduling, and cancellation workflows.</span>
        </div>
      </div>

      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/pricing">Pricing</a>
        <a href="/compliance">SMS Consent</a>
        <a href="/terms">Terms of Service</a>
        <a href="/privacy">Privacy Policy</a>
      </div>
    </div>
  </footer>
</body>
</html>
