<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Vanv AI Agency{% endblock %}</title>
  <meta name="description" content="{% block description %}AI receptionist, calendar booking, SMS confirmations, appointment reminders, rescheduling, and cancellation workflows for service businesses.{% endblock %}">
  <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <span class="brand-mark"><span>V</span></span>
        <span>Vanv AI Agency</span>
      </a>
      <nav class="nav-links">
        <a href="/pricing">Pricing</a>
        <a href="/terms">Terms</a>
        <a href="/privacy">Privacy</a>
      </nav>
      <a class="nav-cta" href="{{ book_demo_url if book_demo_url is defined else '/' }}">Book a Demo</a>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <div class="brand" style="font-size:1rem"><span class="brand-mark" style="width:34px;height:34px;border-radius:10px"><span>V</span></span><span>Vanv AI Agency</span></div>
        <div class="small" style="margin-top:10px">AI receptionist, calendar booking, SMS confirmations, reminders, rescheduling, and cancellation workflows.</div>
      </div>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/pricing">Pricing</a>
        <a href="/terms">Terms of Service</a>
        <a href="/privacy">Privacy Policy</a>
      </div>
    </div>
  </footer>
</body>
</html>
